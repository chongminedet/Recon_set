services:
  # =========================================================================
  # BACKEND API (Flask)
  # =========================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconraas_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - FLASK_DEBUG=False

    volumes:
      - ./recon_results:/app/recon_results
      - ./logs:/app/logs
      - visits-data:/app/data
    networks:
      - recon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # FRONTEND (React + Nginx)
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reconraas_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_BASE=/api
    networks:
      - recon-network
    restart: unless-stopped

  # =========================================================================
  # NGINX REVERSE PROXY
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: reconraas_nginx
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS with SSL certificates
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - /etc/letsencrypt:/etc/nginx/ssl:ro  # Uncomment for SSL certificates
    depends_on:
      - api
      - frontend
    networks:
      - recon-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  recon-network:
    driver: bridge

# ============================================================================
# VOLUMES (Optional - for persistence)
# ============================================================================
volumes:
  visits-data:
