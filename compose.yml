services:
  
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconraas_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - FLASK_DEBUG=False

    volumes:
      - ./recon_results:/app/recon_results
      - ./logs:/app/logs
      - visits-data:/app/data
    networks:
      - recon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reconraas_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_BASE=/api
    networks:
      - recon-network
    restart: unless-stopped


  nginx:
    image: nginx:alpine
    container_name: reconraas_nginx
    ports:
      - "80:80"
     
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - api
      - frontend
    networks:
      - recon-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  recon-network:
    driver: bridge

volumes:
  visits-data:
