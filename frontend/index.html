<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>👾Recon_set</title>
  </head>
  <body>
    <div class="custom-cursor" id="custom-cursor"></div>
    <div id="root"></div>
    <script>
      const cursor = document.getElementById('custom-cursor');
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX - 20 + 'px';
        cursor.style.top = e.clientY - 20 + 'px';
      });

      function bindHoverEvents() {
        document.querySelectorAll('.tool-card, .nav-item, .bottom-nav-item, .result-title, .hamburger-btn, .new-scan-btn, .action-btn, .execute-btn, .settings-theme-card, .settings-toggle, a, button').forEach(el => {
          if (!el.dataset.cursorBound) {
            el.dataset.cursorBound = 'true';
            el.addEventListener('mouseenter', () => { cursor.style.transform = 'scale(1.8)'; });
            el.addEventListener('mouseleave', () => { cursor.style.transform = 'scale(1)'; });
          }
        });
      }

      bindHoverEvents();

      const observer = new MutationObserver(bindHoverEvents);
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
  </body>
</html>
